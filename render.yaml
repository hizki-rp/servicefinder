services:
  - type: web
    name: mertservice-api
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn university_api.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DEBUG
        value: "false"
      - key: RENDER
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: USE_LOCAL_DB
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: mertservice-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "mertservice-api.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://mertservice-api.onrender.com"
    disk:
      name: media-storage
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: mertservice-db
    databaseName: mertservice
    user: mertservice
    plan: free
